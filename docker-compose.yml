# HahaSNS 一键部署（server-nest NestJS + MariaDB + Redis；app 单容器伺服 前端 + /api + /uploads）
# 用法：仓库放到服务器 → cp .env.example .env 设 JWT_SECRET / DB_PASSWORD → docker compose up -d --build
# 1Panel：用「容器 → 编排」粘贴本文件即可。数据库/上传存于命名卷，更新不丢。
#
# ⚠️ 小内存机器(如 2核2G)：容器内要编译前端(vite)+后端(tsc)，峰值内存可能超 2G 把机器打崩。务必：
#   1) 先加 swap 兜底(一次性)：
#        sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
#        echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab   # 开机自启
#   2) 构建时腾内存：先 `docker compose stop` 停掉旧容器再 build（别让 mariadb 和构建抢内存）。
#   Dockerfile 已把构建期 Node 堆封顶到 1024MB(ARG NODE_HEAP_MB)；内存更大的机器可
#   `docker compose build --build-arg NODE_HEAP_MB=3072` 加速。实在吃紧就在别的机器 build 好镜像再拉。
services:
  app:
    build:
      context: .
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}   # 大陆设为 https://registry.npmmirror.com
    image: hahasns:latest
    container_name: hahasns
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-4000}:4000"   # 只绑本机；用面板反向代理把域名转发到这个端口
    environment:
      NODE_ENV: production
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET:?请在 .env 里设置 JWT_SECRET（强随机串）}
      DB_CLIENT: mysql
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: hahasns
      DB_PASSWORD: ${DB_PASSWORD:?请在 .env 里设置 DB_PASSWORD}
      DB_NAME: hahasns
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}   # 首次启动自动建表；数据稳定后在 .env 设 DB_SYNCHRONIZE=false 走迁移
      REDIS_URL: redis://redis:6379
      CLIENT_DIST: /app/client/dist
      UPLOADS_DIR: /app/uploads
      # 可选：首启自动建管理员（仅当库里还没有 admin 时生效；留空=不动）。免手动 SQL 提权，方便全新部署。
      SEED_ADMIN_USER: ${SEED_ADMIN_USER:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      # 可选：部署在反向代理（Nginx / 宝塔 / 1Panel / Cloudflare）后面时设为 1，让「按 IP 的注册/发帖限流」
      # 读取 X-Forwarded-For 拿到真实访客 IP；不设的话所有请求看起来都来自代理 IP，限流会失效。
      TRUST_PROXY: ${TRUST_PROXY:-}
      # 可选：ANTHROPIC_API_KEY（配了才启用 AI 助手）、S3_* （配了走对象存储，否则上传走本地卷）
    volumes:
      - hahasns-uploads:/app/uploads   # 上传的图片/视频（不配 S3 时存这里）
    healthcheck:
      # 用 node 自带 http 探活（slim 镜像无 curl/wget）；start_period 给首启建表留时间
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  mariadb:
    image: mariadb:11
    container_name: hahasns-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: hahasns
      MARIADB_USER: hahasns
      MARIADB_PASSWORD: ${DB_PASSWORD:?请在 .env 里设置 DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
    volumes:
      - hahasns-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: hahasns-redis
    restart: unless-stopped
    volumes:
      - hahasns-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  hahasns-uploads:
  hahasns-db:
  hahasns-redis:

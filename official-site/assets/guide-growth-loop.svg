<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">SaotieSNS 社区运营增长路径</title>
  <desc id="desc">展示新社区从动态活跃、论坛沉淀、圈子关系、问答价值、活动热点到积分回访的运营路径。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset=".55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0c111a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset=".5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity=".25"/>
    </filter>
    <style>
      .t{font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;fill:#f8fafc}
      .m{fill:#a8b3c7}
      .num{font-size:25px;font-weight:900}
      .head{font-size:34px;font-weight:900}
      .body{font-size:23px}
      .card{fill:#151b29;stroke:rgba(255,255,255,.14);stroke-width:1.2}
    </style>
  </defs>
  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="176" cy="112" r="210" fill="#22d3ee" opacity=".12"/>
  <circle cx="1100" cy="570" r="240" fill="#8b5cf6" opacity=".12"/>

  <text class="t head" x="86" y="94">从内容到回访的运营路径</text>
  <text class="t m body" x="86" y="136">新社区不应只堆功能，应让每个功能承担明确的用户需求和运营目标</text>

  <path d="M215 360 C300 210 472 190 595 270 C720 351 820 183 953 236 C1090 290 1096 494 930 548 C762 603 625 503 508 530 C394 556 255 528 215 360Z" fill="none" stroke="url(#line)" stroke-width="8" stroke-linecap="round" opacity=".9"/>
  <path d="M961 238 l-45 -7 l26 38" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect class="card" x="95" y="250" width="265" height="150" rx="26"/>
    <circle cx="138" cy="298" r="26" fill="#22d3ee"/>
    <text class="t num" x="138" y="307" text-anchor="middle">1</text>
    <text class="t head" x="178" y="303">动态活跃</text>
    <text class="t m body" x="126" y="350">低门槛发布，让用户每天都有表达入口。</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="423" y="154" width="265" height="150" rx="26"/>
    <circle cx="466" cy="202" r="26" fill="#2563eb"/>
    <text class="t num" x="466" y="211" text-anchor="middle">2</text>
    <text class="t head" x="506" y="207">论坛沉淀</text>
    <text class="t m body" x="454" y="254">把讨论、教程和公告变成长期内容资产。</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="791" y="154" width="265" height="150" rx="26"/>
    <circle cx="834" cy="202" r="26" fill="#10b981"/>
    <text class="t num" x="834" y="211" text-anchor="middle">3</text>
    <text class="t head" x="874" y="207">圈子关系</text>
    <text class="t m body" x="822" y="254">让同类用户围绕兴趣、城市和身份聚合。</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="829" y="434" width="282" height="150" rx="26"/>
    <circle cx="872" cy="482" r="26" fill="#ef4444"/>
    <text class="t num" x="872" y="491" text-anchor="middle">4</text>
    <text class="t head" x="912" y="487">活动热点</text>
    <text class="t m body" x="860" y="534">用报名、挑战和聚会制造阶段性参与理由。</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="460" y="482" width="282" height="150" rx="26"/>
    <circle cx="503" cy="530" r="26" fill="#f59e0b"/>
    <text class="t num" x="503" y="539" text-anchor="middle">5</text>
    <text class="t head" x="543" y="535">问答价值</text>
    <text class="t m body" x="491" y="582">悬赏问题让用户获得帮助，也沉淀答案。</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="154" y="470" width="250" height="138" rx="26"/>
    <circle cx="197" cy="516" r="26" fill="#8b5cf6"/>
    <text class="t num" x="197" y="525" text-anchor="middle">6</text>
    <text class="t head" x="237" y="521">积分回访</text>
    <text class="t m body" x="186" y="568">任务、签到、兑换和打赏形成每日循环。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="438" y="326" width="404" height="72" rx="36" fill="rgba(255,255,255,.07)" stroke="rgba(255,255,255,.14)"/>
    <text class="t body" x="640" y="370" text-anchor="middle">核心目标：内容有价值，互动有反馈，参与有回报</text>
  </g>
</svg>
